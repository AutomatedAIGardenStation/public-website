# public-site CI + GitHub Pages deployment
# On PR: type-check, lint, build (no deploy)
# On push to master: type-check, lint, build, then deploy to GitHub Pages

name: public-site CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  ci:
    name: Lint -> Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Lint (ESLint via Next CLI)
        run: npm run lint
        continue-on-error: true

      - name: Build static export (next build)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/

  deploy:
    name: Deploy to GitHub Pages
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-ci-cd:
    name: Notify pipeline-orchestrator
    runs-on: ubuntu-latest
    needs: ci
    if: always()
    steps:
      - name: Dispatch public-site-changed
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          script: |
            const branch = context.payload.pull_request
              ? context.payload.pull_request.head.ref
              : context.ref.replace(/^refs\/heads\//, '');
            const prNumber = context.payload.pull_request ? context.payload.pull_request.number : null;
            const status = '${{ needs.ci.result }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createDispatchEvent({
              owner: 'AutomatedAIGardenStation',
              repo: 'pipeline-orchestrator',
              event_type: 'public-site-changed',
              client_payload: { branch, pr_number: prNumber, status }
            });
            console.log(`Dispatched public-site-changed (${status})`);
