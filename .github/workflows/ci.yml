# public-site CI (Next.js 16 + TypeScript + Tailwind)
# Runs on every push / PR to main.
# Type-checks, lints, and builds the production Next.js export.

name: public-site CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    name: Lint → Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Lint (ESLint via Next CLI)
        run: npm run lint
        continue-on-error: true   # eslint config may need tuning initially

      - name: Build production bundle (next build)
        run: npm run build
        env:
          # Prevent Next.js telemetry in CI
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: public-site-build
          path: .next/
          retention-days: 7

  # ── Notify ci-cd repo ──────────────────────────────────────────────────────
  notify-ci-cd:
    name: Notify pipeline-orchestrator
    runs-on: ubuntu-latest
    needs: ci
    if: always()
    steps:
      - name: Dispatch public-site-changed
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          script: |
            const branch = context.payload.pull_request
              ? context.payload.pull_request.head.ref
              : context.ref.replace(/^refs\/heads\//, '');
            const prNumber = context.payload.pull_request ? context.payload.pull_request.number : null;
            const status = '${{ needs.ci.result }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createDispatchEvent({
              owner: 'AutomatedAIGardenStation',
              repo: 'pipeline-orchestrator',
              event_type: 'public-site-changed',
              client_payload: { branch, pr_number: prNumber, status }
            });
            console.log(`Dispatched public-site-changed (${status})`);
